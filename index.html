<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Odd Emoji Generator - Fixed</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #111; /* Dark background outside the video */
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            font-family: -apple-system, sans-serif;
        }

        /* Strictly forces a 9:16 aspect ratio (TikTok/Shorts format) */
        #video-frame {
            width: 100%;
            height: 100%;
            max-width: 450px; /* Keeps it phone-sized on laptop */
            max-height: 800px;
            background: linear-gradient(135deg, #ff007a, #ff7300);
            position: relative;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* Top timer bar */
        .timer-bar {
            width: 0%; height: 6px; background: white;
            position: absolute; top: 0; left: 0;
            transition: width 10s linear;
        }

        .title {
            margin-top: 10%;
            background: #ffffff;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 28px;
            font-weight: 800;
            color: #111;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-align: center;
            width: 80%;
            z-index: 10;
        }

        /* The Grid - Fixed to stay inside the box */
        .grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 5px; /* Fixed gap */
            margin-top: 10%;
            padding: 15px;
            width: 90%; /* Strict width */
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .cell {
            position: relative;
            display: flex; justify-content: center; align-items: center;
            aspect-ratio: 1/1;
            font-size: 30px; /* Absolute font size so emojis never overflow */
        }

        /* The 2-Second Flying Pulse Ring */
        .reveal-ring {
            position: absolute;
            width: 130%; height: 130%;
            border: 5px solid #00FF00;
            border-radius: 50%;
            opacity: 0;
            transform: scale(5) translateY(-300px);
            animation: flyInAndPulse 2s forwards;
            z-index: 50;
        }

        @keyframes flyInAndPulse {
            0% { transform: scale(5) translateY(-300px); opacity: 0; }
            20% { transform: scale(1) translateY(0); opacity: 1; box-shadow: 0 0 10px #00FF00; }
            50% { transform: scale(1.3); box-shadow: 0 0 30px #00FF00; }
            80% { transform: scale(1); box-shadow: 0 0 10px #00FF00; }
            100% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 0px #00FF00; }
        }

        /* Creator UI Controls */
        #controls {
            position: absolute; bottom: 5%;
            display: flex; gap: 15px; z-index: 100;
        }
        button {
            padding: 12px 20px; font-size: 16px; font-weight: bold;
            border: none; border-radius: 10px; cursor: pointer;
        }
        .btn-shuffle { background: #333; color: white; }
        .btn-play { background: #00FF00; color: black; }
        .hidden { display: none !important; }

        /* Media query to slightly reduce emoji size on very tiny phones */
        @media (max-width: 380px) {
            .cell { font-size: 24px; }
            .title { font-size: 22px; }
        }
    </style>
</head>
<body>

    <div id="video-frame">
        <div class="timer-bar" id="timerBar"></div>
        <div class="title" id="titleText">Find the odd one 🧐</div>
        
        <div class="grid" id="grid"></div>

        <div id="controls">
            <button class="btn-shuffle" onclick="generateGrid()">🔀 Shuffle</button>
            <button class="btn-play" onclick="startRecordingSequence()">▶️ Record</button>
        </div>
    </div>

    <script>
        const emojiPairs = [
            { base: '🦄', odd: '🐴' },
            { base: '🤩', odd: '😍' },
            { base: '😁', odd: '😬' },
            { base: '🤖', odd: '👾' },
            { base: '🍎', odd: '🍅' },
            { base: '👀', odd: '👁️👁️' },
            { base: '🦊', odd: '🐺' },
            { base: '🍔', odd: '🥪' }
        ];

        let currentOddIndex = 0;

        function generateGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = ''; 
            
            const randomPair = emojiPairs[Math.floor(Math.random() * emojiPairs.length)];
            const totalCells = 64;
            currentOddIndex = Math.floor(Math.random() * totalCells);

            for (let i = 0; i < totalCells; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `cell-${i}`;
                cell.innerText = (i === currentOddIndex) ? randomPair.odd : randomPair.base;
                grid.appendChild(cell);
            }
        }

        function startRecordingSequence() {
            document.getElementById('controls').classList.add('hidden');
            
            const timerBar = document.getElementById('timerBar');
            setTimeout(() => { timerBar.style.width = '100%'; }, 50);

            setTimeout(() => {
                const targetCell = document.getElementById(`cell-${currentOddIndex}`);
                const ring = document.createElement('div');
                ring.className = 'reveal-ring';
                targetCell.appendChild(ring);
            }, 10000);

            setTimeout(() => {
                document.getElementById('controls').classList.remove('hidden');
                timerBar.style.width = '0%';
                timerBar.style.transition = 'none'; 
                setTimeout(() => { timerBar.style.transition = 'width 10s linear'; }, 100);
            }, 13000);
        }

        window.onload = generateGrid;
    </script>
</body>
</html>
